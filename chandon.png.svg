<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="100" fill="url(#bg2)"/>
  <!-- Face -->
  <ellipse cx="100" cy="115" rx="55" ry="50" fill="#3a3530"/>
  <!-- Ears -->
  <ellipse cx="60" cy="55" rx="18" ry="28" fill="#3a3530" transform="rotate(-10 60 55)"/>
  <ellipse cx="140" cy="55" rx="18" ry="28" fill="#3a3530" transform="rotate(10 140 55)"/>
  <ellipse cx="60" cy="55" rx="12" ry="20" fill="#4a4540" transform="rotate(-10 60 55)"/>
  <ellipse cx="140" cy="55" rx="12" ry="20" fill="#4a4540" transform="rotate(10 140 55)"/>
  <!-- Eyes (serious look) -->
  <circle cx="78" cy="100" r="12" fill="#1a1a1a"/>
  <circle cx="122" cy="100" r="12" fill="#1a1a1a"/>
  <circle cx="81" cy="97" r="5" fill="white"/>
  <circle cx="125" cy="97" r="5" fill="white"/>
  <!-- Brow (serious) -->
  <line x1="65" y1="84" x2="88" y2="86" stroke="#2a2520" stroke-width="3" stroke-linecap="round"/>
  <line x1="135" y1="84" x2="112" y2="86" stroke="#2a2520" stroke-width="3" stroke-linecap="round"/>
  <!-- Nose -->
  <ellipse cx="100" cy="118" rx="10" ry="7" fill="#1a1a1a"/>
  <!-- Mouth (neutral/cool) -->
  <line x1="85" y1="132" x2="115" y2="132" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- White chest patch -->
  <ellipse cx="100" cy="165" rx="18" ry="14" fill="white" opacity="0.9"/>
  <!-- Name -->
  <text x="100" y="190" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#00B4A6">CHANDON</text>
</svg>