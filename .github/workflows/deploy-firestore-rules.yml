name: Deploy Firestore rules

on:
  push:
    branches: [main]
    paths:
      - 'firestore.rules'
      - 'firebase.json'
      - '.firebaserc'
      - '.github/workflows/deploy-firestore-rules.yml'
  workflow_dispatch:

# Why this workflow does NOT use `firebase-tools deploy`:
# `firebase-tools` calls serviceusage.googleapis.com first to verify the
# Firestore API is enabled, which requires roles/serviceusage.services.use
# on the GCP project — a role the human Firebase admin doesn't always
# carry. We deploy via the firebaserules.googleapis.com REST API directly,
# which only requires firebaserules.releases.update — covered by Firebase
# Editor / Owner roles. Trade-off: zero firebase-tools dependency, no
# preflight checks (caller is responsible for ensuring Firestore is
# already enabled, which it is for any project that has data).

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Firestore rules via REST API
        env:
          REFRESH_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          PROJECT_ID: claude-code-course-df778
        run: |
          python3 << 'PYEOF'
          import json
          import os
          import sys
          import urllib.request
          import urllib.parse

          REFRESH = os.environ['REFRESH_TOKEN']
          PROJECT = os.environ['PROJECT_ID']

          # Well-known Firebase CLI OAuth client.
          CLIENT_ID = '563584335869-fgrhgmd47bqnekij5i8b5pr03ho849e6.apps.googleusercontent.com'
          CLIENT_SECRET = 'j9iVZfS8kkCEFUPaAeJV0sAi'

          def post(url, data, headers):
              req = urllib.request.Request(
                  url, data=data, headers=headers, method='POST',
              )
              try:
                  with urllib.request.urlopen(req, timeout=30) as r:
                      return r.status, json.loads(r.read().decode())
              except urllib.error.HTTPError as e:
                  return e.code, json.loads(e.read().decode())

          # Step 1: refresh -> access_token
          token_body = urllib.parse.urlencode({
              'client_id': CLIENT_ID,
              'client_secret': CLIENT_SECRET,
              'refresh_token': REFRESH,
              'grant_type': 'refresh_token',
          }).encode()
          status, resp = post(
              'https://oauth2.googleapis.com/token',
              token_body,
              {'Content-Type': 'application/x-www-form-urlencoded'},
          )
          if status != 200:
              print('OAuth refresh failed:', status, resp)
              sys.exit(1)
          access_token = resp['access_token']
          print('OAuth refresh OK; access_token expires in', resp.get('expires_in'), 'sec')

          auth_headers = {
              'Authorization': 'Bearer ' + access_token,
              'Content-Type': 'application/json',
          }

          # Step 2: upload ruleset content
          rules_text = open('firestore.rules').read()
          ruleset_body = json.dumps({
              'source': {
                  'files': [
                      {'name': 'firestore.rules', 'content': rules_text},
                  ],
              },
          }).encode()
          status, resp = post(
              'https://firebaserules.googleapis.com/v1/projects/' + PROJECT + '/rulesets',
              ruleset_body,
              auth_headers,
          )
          if status != 200:
              print('Ruleset create failed:', status, resp)
              sys.exit(1)
          ruleset_name = resp['name']
          print('Ruleset created:', ruleset_name)

          # Step 3: point cloud.firestore release at the new ruleset.
          # PATCH semantics on this API are fussy ("Unknown name rulesetName"
          # despite docs); use DELETE + POST to swap the release atomically.
          # Firestore continues serving the last-known ruleset between the
          # two ops (release-resolution caches), so the gap is benign.
          release_path = 'projects/' + PROJECT + '/releases/cloud.firestore'
          # DELETE existing release (404 is fine — first-ever deploy).
          del_req = urllib.request.Request(
              'https://firebaserules.googleapis.com/v1/' + release_path,
              headers=auth_headers, method='DELETE',
          )
          try:
              with urllib.request.urlopen(del_req, timeout=30) as r:
                  print('Old release DELETE ok')
          except urllib.error.HTTPError as e:
              if e.code == 404:
                  print('No existing release to delete (first deploy)')
              else:
                  print('Old release DELETE failed:', e.code, e.read().decode())
                  sys.exit(1)
          # POST the new release.
          status, resp = post(
              'https://firebaserules.googleapis.com/v1/projects/' + PROJECT + '/releases',
              json.dumps({
                  'name': release_path,
                  'rulesetName': ruleset_name,
              }).encode(),
              auth_headers,
          )
          if status != 200:
              print('Release POST failed:', status, resp)
              sys.exit(1)
          print('Release created:', resp.get('name'))
          print('Active rulesetName:', resp.get('rulesetName'))
          PYEOF
