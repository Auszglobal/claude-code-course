<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>
  <!-- Face -->
  <ellipse cx="100" cy="115" rx="55" ry="50" fill="#2d2d2d"/>
  <!-- Ears -->
  <ellipse cx="60" cy="55" rx="18" ry="28" fill="#2d2d2d" transform="rotate(-10 60 55)"/>
  <ellipse cx="140" cy="55" rx="18" ry="28" fill="#2d2d2d" transform="rotate(10 140 55)"/>
  <ellipse cx="60" cy="55" rx="12" ry="20" fill="#3d3d3d" transform="rotate(-10 60 55)"/>
  <ellipse cx="140" cy="55" rx="12" ry="20" fill="#3d3d3d" transform="rotate(10 140 55)"/>
  <!-- Eyes -->
  <circle cx="78" cy="100" r="12" fill="#1a1a1a"/>
  <circle cx="122" cy="100" r="12" fill="#1a1a1a"/>
  <circle cx="82" cy="96" r="5" fill="white"/>
  <circle cx="126" cy="96" r="5" fill="white"/>
  <!-- Nose -->
  <ellipse cx="100" cy="118" rx="10" ry="7" fill="#1a1a1a"/>
  <!-- Mouth (smiling) -->
  <path d="M 80 128 Q 100 148 120 128" stroke="#1a1a1a" stroke-width="3" fill="none"/>
  <!-- Tongue -->
  <ellipse cx="105" cy="138" rx="8" ry="12" fill="#e88" />
  <!-- White chest patch -->
  <ellipse cx="100" cy="165" rx="20" ry="15" fill="white" opacity="0.9"/>
  <!-- Name -->
  <text x="100" y="190" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#00B4A6">TT</text>
</svg>